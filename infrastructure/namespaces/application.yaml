apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "-10"

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  source:
    repoURL: https://github.com/windjuhh/k8s-mysql.git
    targetRevision: main
    path: infrastructure/namespaces

  syncPolicy:
    automated:
      prune: true
      selfHeal: true